<div class="top-nav-row">
    <a routerLink="/" class="floating-logo" id="logo-link" (click)="closeMobileMenu()">
        <img src="assets/images/logo.png" alt="Hey Laundry" class="logo-img" />
    </a>

    <header [class.scrolled]="isScrolled" id="main-header">
        <div class="header-container">
            <nav class="desktop-nav" id="desktop-navigation">
                <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
                    id="nav-home">Home</a>
                <a routerLink="/services" routerLinkActive="active" id="nav-services">Services</a>
                <a routerLink="/pricing" routerLinkActive="active" id="nav-pricing">Pricing</a>
                <a routerLink="/contact" routerLinkActive="active" id="nav-contact">Contact</a>
            </nav>

            <div class="header-right">
                <a href="https://www.instagram.com/heylaundryhyd" target="_blank" class="header-social"
                    aria-label="Instagram" id="header-instagram">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z" />
                    </svg>
                </a>
                <a href="tel:+919876543210" class="header-cta" id="header-cta-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z" />
                    </svg>
                    Schedule a Pickup
                </a>
            </div>

            <button class="mobile-menu-btn" (click)="toggleMobileMenu()" [class.active]="mobileMenuOpen"
                id="mobile-menu-toggle" aria-label="Toggle mobile menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>

        <div class="mobile-nav" [class.open]="mobileMenuOpen" id="mobile-navigation">
            <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
                (click)="closeMobileMenu()" id="mobile-nav-home">Home</a>
            <a routerLink="/services" routerLinkActive="active" (click)="closeMobileMenu()"
                id="mobile-nav-services">Services</a>
            <a routerLink="/pricing" routerLinkActive="active" (click)="closeMobileMenu()"
                id="mobile-nav-pricing">Pricing</a>
            <a routerLink="/contact" routerLinkActive="active" (click)="closeMobileMenu()"
                id="mobile-nav-contact">Contact</a>
            <div class="mobile-bottom">
                <a href="https://www.instagram.com/heylaundry" target="_blank" class="mobile-ig"
                    (click)="closeMobileMenu()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z" />
                    </svg>
                    Follow Us
                </a>
                <a href="tel:+919876543210" class="mobile-cta" (click)="closeMobileMenu()" id="mobile-cta-btn">
                    📞 Schedule a Pickup
                </a>
            </div>
        </div>
    </header>
</div>
