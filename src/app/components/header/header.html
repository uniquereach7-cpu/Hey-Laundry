<header class="luxury-header" [class.scrolled]="isScrolled" itemscope itemtype="https://schema.org/WPHeader">
    <div class="header-container">
        <!-- Logo -->
        <a routerLink="/" class="logo" aria-label="Hey Laundry Homepage">
            <img src="assets/images/logo.png" alt="Hey Laundry - Premium Doorstep Laundry & Dry Cleaning in Hyderabad" class="logo-img" itemprop="logo" />
        </a>

        <!-- Desktop Navigation -->
        <nav class="desktop-nav" itemscope itemtype="https://schema.org/SiteNavigationElement">
            <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" itemprop="url"><span itemprop="name">Home</span></a>
            <a routerLink="/services" routerLinkActive="active" itemprop="url"><span itemprop="name">Services</span></a>
            <a routerLink="/pricing" routerLinkActive="active" itemprop="url"><span itemprop="name">Pricing</span></a>
            <a routerLink="/contact" routerLinkActive="active" itemprop="url"><span itemprop="name">Contact</span></a>
            
            <a href="https://www.instagram.com/heylaundryhyd" target="_blank" rel="noopener noreferrer" class="ig-nav-link" aria-label="Follow us on Instagram">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
            </a>
        </nav>

        <!-- CTA & Mobile Toggle -->
        <div class="header-actions">
            <!-- Direct Dial CTA for better convertion -->
            <a href="tel:+919876543210" class="btn-royal shimmer-btn desktop-cta">Schedule Pickup</a>
            
            <button class="mobile-toggle" (click)="toggleMobileMenu()" aria-label="Toggle navigation menu">
                <span class="hamburger" [class.active]="mobileMenuOpen"></span>
            </button>
        </div>
    </div>

    <!-- Mobile Navigation -->
    <div class="mobile-menu" [class.open]="mobileMenuOpen">
        <nav class="mobile-nav">
            <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMobileMenu()">Home</a>
            <a routerLink="/services" routerLinkActive="active" (click)="closeMobileMenu()">Services</a>
            <a routerLink="/pricing" routerLinkActive="active" (click)="closeMobileMenu()">Pricing</a>
            <a routerLink="/contact" routerLinkActive="active" (click)="closeMobileMenu()">Contact</a>
            
            <a href="https://www.instagram.com/heylaundryhyd" target="_blank" rel="noopener noreferrer" class="mobile-ig" (click)="closeMobileMenu()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
                Instagram
            </a>

            <a href="tel:+919876543210" class="btn-primary mobile-cta-btn" (click)="closeMobileMenu()">Schedule Pickup</a>
        </nav>
    </div>
</header>
